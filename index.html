<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samos Restaurant</title>
    <link rel="icon" href="./assets/icons/round_image.jpg">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./styles/assets.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/basket.css">
    <link rel="stylesheet" href="./styles/media.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
    <script src="./scripts/templates.js"></script>
</head>

<body onload="init()">
    <header>
        <nav class="navbar">
            <img src="./assets/icons/logo2.png" alt="">
            <button class="navbar-toggler" type="button">
                <span class="navbar-toggler-icon"></span>
            </button>
        </nav>
        <section class="headerImage">
            <img src="./assets/img/header_image.jpg" alt="">
        </section>
        <div class="roundImage">
            <img src="./assets/icons/round_image.jpg" alt="">
        </div>
        <section class="headerText">
            <h1><span style="color: #E76C1F;">Restaurant</span>Samos</h1>
            <div class="valuation"><img src="./assets/icons/star.png" alt="">
                <span> 4,7 </span><span style="color:#726D6D;">(411)</span>
            </div>
        </section>
        <p class="moto">Wo Griechenland nach Hause kommt – frisch, aromatisch, Samos pur.</p>
    </header>
    <main>
        <div class="menuWrapper">
            <div id="content" class="content">
            </div>
            <div class="basketWrapper">
                <div id="basket" class="basket">

                </div>
            </div>
        </div>
    </main>
<footer>
    <button><img src="./assets/icons/home.png" alt=""></button>
    <button><img src="./assets/icons/profile.png" alt=""></button>
    <button><img src="./assets/icons/orders.png" alt=""></button>
    <button><img src="./assets/icons/basket.png" alt=""></button>
</footer>
</body>

</html>
